services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d crm_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/crm_db
      REDIS_URL: redis://redis:6379
      CHATBOT_URL: http://ai_chatbot:8003
      REPORT_SERVICE_URL: http://report_service:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai_chatbot:
        condition: service_started
      report_service:
        condition: service_started
    volumes:
      - ./server/logs:/app/logs
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── AI Chatbot Microservice ──────────────────────────────────────────────────
  ai_chatbot:
    build:
      context: ./crm_microservices/ai_chatbot
      dockerfile: Dockerfile
    container_name: crm_chatbot
    restart: unless-stopped
    ports:
      - '8003:8003'
    env_file:
      - ./crm_microservices/ai_chatbot/.env
    environment:
      - PORT=8003
      - FRONTEND_URL=http://localhost:3000

  # ── Reports & Analytics Microservice ─────────────────────────────────────────
  report_service:
    build:
      context: ./crm_microservices/report_service
      dockerfile: Dockerfile
    container_name: crm_report_service
    restart: unless-stopped
    ports:
      - '8002:8002'
    env_file:
      - ./crm_microservices/report_service/.env
    environment:
      - PORT=8002
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/crm_db
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
