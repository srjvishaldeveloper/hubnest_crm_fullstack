# ─── HubNest CRM — Production Docker Compose ─────────────────────────────────
# Images are pre-built and pushed by Jenkins; this file only pulls and runs.
# All secrets come from server.env and client.env uploaded by the pipeline.
# ─────────────────────────────────────────────────────────────────────────────

version: '3.9'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '20m'
    max-file: '5'

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend_net
    logging: *default-logging

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net
    logging: *default-logging

  # ── Express Backend ───────────────────────────────────────────────────────────
  backend:
    image: ${IMAGE_BACKEND}:${IMAGE_TAG}
    restart: unless-stopped
    env_file: server.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-crm_db}
      REDIS_URL: redis://redis:6379
      CHATBOT_URL: http://chatbot:8003
      REPORT_SERVICE_URL: http://reports:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chatbot:
        condition: service_started
      reports:
        condition: service_started
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:5000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend_net
      - frontend_net
    logging: *default-logging

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    image: ${IMAGE_FRONTEND}:${IMAGE_TAG}
    restart: unless-stopped
    env_file: client.env
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - frontend_net
    logging: *default-logging

  # ── AI Chatbot Microservice ───────────────────────────────────────────────────
  chatbot:
    image: ${IMAGE_CHATBOT}:${IMAGE_TAG}
    restart: unless-stopped
    env_file: server.env
    environment:
      PORT: 8003
    networks:
      - backend_net
    logging: *default-logging

  # ── Reports Microservice ──────────────────────────────────────────────────────
  reports:
    image: ${IMAGE_REPORTS}:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      PORT: 8002
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-crm_db}
      FRONTEND_URL: ${FRONTEND_URL:-https://hubnest.in}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend_net
    logging: *default-logging

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl_certs:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - frontend_net
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  nginx_logs:
  ssl_certs:

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge
