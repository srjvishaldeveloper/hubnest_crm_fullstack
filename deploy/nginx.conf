# ─── HubNest CRM — Nginx Reverse Proxy ───────────────────────────────────────
# Handles:  HTTPS termination, HTTP→HTTPS redirect, API proxy, WebSocket proxy,
#           static asset caching, security headers, rate limiting.
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
  multi_accept on;
  use epoll;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;

  # ── Performance ───────────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_vary          on;
  gzip_min_length    1024;
  gzip_proxied       any;
  gzip_types         text/plain text/css application/json application/javascript
                     text/xml application/xml application/xml+rss text/javascript
                     image/svg+xml;

  # ── Rate Limiting ─────────────────────────────────────────────────────────────
  limit_req_zone  $binary_remote_addr zone=api:10m  rate=60r/m;
  limit_req_zone  $binary_remote_addr zone=auth:10m rate=10r/m;
  limit_req_zone  $binary_remote_addr zone=global:10m rate=120r/m;

  # ── Upstream Definitions ──────────────────────────────────────────────────────
  upstream frontend {
    server frontend:3000;
    keepalive 16;
  }

  upstream backend {
    server backend:5000;
    keepalive 16;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
  server {
    listen 80;
    server_name hubnest.in www.hubnest.in;
    return 301 https://$host$request_uri;
  }

  # ── Main HTTPS server ─────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name hubnest.in www.hubnest.in;

    # SSL — certificates managed by Certbot / Let's Encrypt on host,
    # mounted into the nginx container at /etc/nginx/ssl/
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 25M;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
    }

    # ── Auth endpoints — stricter rate limit ──────────────────────────────────
    location ~ ^/api/v1/auth/ {
      limit_req zone=auth burst=5 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── WebSocket (Socket.io) ─────────────────────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;
    }

    # ── Backend health (internal) ─────────────────────────────────────────────
    location /health {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      access_log off;
    }

    # ── Next.js static assets — long cache ───────────────────────────────────
    location /_next/static/ {
      proxy_pass       http://frontend;
      proxy_cache_valid 200 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
      access_log off;
    }

    location /favicon.ico {
      proxy_pass  http://frontend;
      add_header  Cache-Control "public, max-age=86400";
      access_log  off;
    }

    location /robots.txt {
      proxy_pass  http://frontend;
      access_log  off;
    }

    location /sitemap.xml {
      proxy_pass  http://frontend;
      access_log  off;
    }

    # ── Next.js — everything else ─────────────────────────────────────────────
    location / {
      limit_req zone=global burst=30 nodelay;

      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 30s;
    }
  }
}
